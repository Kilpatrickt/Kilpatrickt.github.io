<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
        <span class="brand-mark">K</span>
        <span>{{ site.title }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/archive/' | relative_url }}">归档</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© {{ 'now' | date: '%Y' }} {{ site.author }}. Built with GitHub Pages.</p>
    </footer>
  </body>
</html>
