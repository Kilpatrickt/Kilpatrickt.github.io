title: Leo Blog
description: Leo's notes on Agent, Data, LLM, engineering, and life.
author: Leo
url: "https://kilpatrickt.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai

permalink: /:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

markdown: kramdown
kramdown:
  input: GFM

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
